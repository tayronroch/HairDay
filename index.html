<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="./src/assets/scissors.svg" />

    <title>Hair Day</title>
  </head>
  <body>
    <div class="container">
      <img src="./src/assets/logo.svg" alt="Logo" class="logo" />

      <form class="form">
        <header>
          <h1>Agende um atendimento</h1>
          <p>
            Selecione data, horário e informe o nome do cliente para criar o
            agendamento
          </p>
        </header>

        <label for="date" class="label">Data</label>
        <div class="input">
          <i><img src="./src/assets/calendar.svg" alt="Calendário" /></i>
          <input type="date" id="date" name="date" required />
        </div>

        <span class="label">Horários</span>
        <ul id="hours" class="hours" aria-label="Horários disponíveis de manhã">
          <!-- Exemplo: Manhã 
          <li data-period="morning" class="hour-period">Manhã</li>
           <li data-period="morning" value="09:00" class="hour hour-available">
            09:00
          </li>
          <li data-period="morning" value="10:00" class="hour hour-available">
            10:00
          </li>
          <li data-period="morning" value="11:00" class="hour hour-unavailable">
            11:00
          </li>
          <li data-period="morning" value="12:00" class="hour hour-available">
            12:00
          </li>
          -->
          <!-- Exemplo: Tarde  
          <li data-period="afternoon" class="hour-period">Tarde</li>
          <li
            data-period="afternoon"
            value="13:00"
            class="hour hour-unavailable"
          >
            13:00
          </li>
          <li
            data-period="afternoon"
            value="14:00"
            class="hour hour-unavailable"
          >
            14:00
          </li>
          <li data-period="afternoon" value="15:00" class="hour hour-available">
            15:00
          </li>
          <li
            data-period="afternoon"
            value="16:00"
            class="hour hour-unavailable"
          >
            16:00
          </li>
          <li
            data-period="afternoon"
            value="17:00"
            class="hour hour-unavailable"
          >
            17:00
          </li>
          <li data-period="afternoon" value="18:00" class="hour hour-available">
            18:00
          </li>
          -->
          <!-- Exemplo: Noite 
          <li data-period="night" class="hour-period">Noite</li>

          <li data-period="night" value="19:00" class="hour hour-available">
            19:00
          </li>
          <li data-period="night" value="20:00" class="hour hour-available">
            20:00
          </li>
          <li data-period="night" value="21:00" class="hour hour-unavailable">
            21:00
          </li>
          -->
        </ul>

        <label for="client" class="label">Cliente</label>
        <div class="input">
          <i><img src="./src/assets/person.svg" alt="Calendário" /></i>
          <input
            type="text"
            id="client"
            name="client"
            placeholder="Nome do cliente"
            required
          />
        </div>

        <button type="submit" class="button">Agendar</button>
      </form>

      <aside class="schedule">
        <header>
          <h1>Agendamentos</h1>
          <p>Visualize os agendamentos de acordo com o dia selecionado</p>
        </header>

        <section class="schedule-period">
          <header>
            <img src="./src/assets/morning.svg" alt="Manhã" />
            <strong>Manhã</strong>
            <span>09h-12h</span>
          </header>
          <ul id="period-morning" class="period"></ul>
        </section>

        <section class="schedule-period">
          <header>
            <img src="./src/assets/afternoon.svg" alt="Tarde" />
            <strong>Tarde</strong>
            <span>13h-18h</span>
          </header>
          <ul id="period-afternoon" class="period"></ul>
        </section>

        <section class="schedule-period">
          <header>
            <img src="./src/assets/night.svg" alt="Noite" />
            <strong>Noite</strong>
            <span>19h-21h</span>
          </header>
          <ul id="period-night" class="period"></ul>
        </section>
      </aside>
    </div>

    <dialog id="app-dialog" class="app-dialog">
      <div class="dialog-content">
        <span id="dialog-icon"></span>
        <p id="dialog-message"></p>
      </div>
      <form method="dialog">
        <button id="dialog-close" class="dialog-close">OK</button>
      </form>
    </dialog>

    <dialog id="confirm-dialog" class="app-dialog">
      <div class="dialog-content">
        <span>
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#b8952e"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
            ></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
        </span>
        <p
          id="confirm-message"
          style="
            color: #b8952e;
            font-size: 1.125rem;
            font-weight: 500;
            line-height: 1.5;
          "
        ></p>
      </div>
      <div style="display: flex; gap: 1rem">
        <button
          id="confirm-no"
          class="dialog-close"
          style="
            background-color: #2e2c30;
            color: #f5f4f5;
            border: 1px solid #b8952e;
          "
        >
          Cancelar
        </button>
        <button id="confirm-yes" class="dialog-close">Confirmar</button>
      </div>
    </dialog>

    <script src="./src/main.js" defer></script>
  </body>
</html>
